server_type: generic
mode: auto
detector_mode: mock
tests:
  - name: cpu_test
    enabled: true
    params:
      stress_duration: 300
      threads: auto

  - name: memory_test
    enabled: true
    params:
      capacity_check: true
      ecc_check: true
      stress_duration: 300

  - name: storage_test
    enabled: true
    params:
      test_nvme: true
      test_sata: true
      performance_test: true

  - name: network_test
    enabled: true
    params:
      test_ports: auto
      throughput_test: true

output:
  formats: [json, html, csv]
  upload_to_ems: true
  ems_endpoint: "http://localhost:8080/api/v1/results"
